services:
  - type: web
    name: kontrakanku
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kontrakanku-db
          property: connectionString

databases:
  - name: kontrakanku-db
    plan: free
